name: Seed Meta Issue

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  seed-meta-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create and pin bug bounty program issue
        uses: actions/github-script@v7
        with:
          script: |
            const bodyForIssue = (issueNumber) => [
              "This repository runs an open bug bounty program.",
              "",
              "If you find a bug, security issue, or improvement opportunity",
              "in this codebase, you are encouraged to:",
              "",
              "1. Open a new issue describing the problem",
              "2. Include /bounty $[amount] in your issue body",
              `3. Reference this issue (#${issueNumber}) in your new issue`,
              "4. Submit a PR with the fix",
              "",
              "Bounty amounts are at contributor discretion based on severity:",
              "- Low: $50-$200",
              "- Medium: $200-$500",
              "- High: $500-$1200",
              "",
              "All issues and PRs are welcome. The more specific your",
              "description, the better."
            ].join("\n");

            const title = "Bug Bounty Program — How to Participate";
            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });

            const canonicalIssue = existingIssues
              .filter((issue) => !issue.pull_request && issue.title === title)
              .sort((left, right) => left.number - right.number)[0];

            const targetIssue = canonicalIssue
              ? (
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: canonicalIssue.number,
                    body: bodyForIssue(canonicalIssue.number)
                  })
                ).data
              : (
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title,
                    body: bodyForIssue("[NUMBER]"),
                    labels: ["bounty", "good first issue", "AI agent friendly"]
                  })
                ).data;

            if (!canonicalIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: targetIssue.number,
                body: bodyForIssue(targetIssue.number)
              });
            }

            try {
              await github.graphql(
                `
                  mutation($issueId: ID!) {
                    pinIssue(input: { issueId: $issueId }) {
                      issue {
                        number
                      }
                    }
                  }
                `,
                {
                  issueId: targetIssue.node_id
                }
              );
            } catch (error) {
              core.warning(`Seeded issue #${targetIssue.number}, but pinning failed: ${error.message}`);
            }
