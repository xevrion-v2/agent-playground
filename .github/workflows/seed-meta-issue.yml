name: Seed Meta Issue

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  seed-meta-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create and pin bug bounty program issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const issueLabels = ["bounty", "good first issue", "AI agent friendly"];

            const loadLabelDefinitions = () => {
              const content = fs.readFileSync(".github/labels.yml", "utf8");
              const labels = [];
              let current = null;

              for (const rawLine of content.split(/\r?\n/)) {
                const line = rawLine.trim();

                if (!line) {
                  continue;
                }

                if (line.startsWith("- name:")) {
                  if (current) {
                    labels.push(current);
                  }

                  current = {
                    name: line.replace("- name:", "").trim().replace(/^"|"$/g, "")
                  };
                  continue;
                }

                if (!current) {
                  continue;
                }

                const separatorIndex = line.indexOf(":");

                if (separatorIndex === -1) {
                  continue;
                }

                const key = line.slice(0, separatorIndex).trim();
                const value = line.slice(separatorIndex + 1).trim().replace(/^"|"$/g, "");
                current[key] = value;
              }

              if (current) {
                labels.push(current);
              }

              return labels;
            };

            const ensureLabels = async (requiredNames) => {
              const definitionsByName = new Map(
                loadLabelDefinitions().map((label) => [label.name, label])
              );

              for (const name of requiredNames) {
                const label = definitionsByName.get(name);

                if (!label) {
                  throw new Error(`Missing label definition for "${name}" in .github/labels.yml`);
                }

                const color = label.color.replace(/^#/, "");

                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color,
                    description: label.description || ""
                  });
                } catch (error) {
                  if (error.status !== 422) {
                    throw error;
                  }

                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color,
                    description: label.description || ""
                  });
                }
              }
            };

            const bodyForIssue = (issueNumber) => [
              "This repository runs an open bug bounty program.",
              "",
              "If you find a bug, security issue, or improvement opportunity",
              "in this codebase, you are encouraged to:",
              "",
              "1. Open a new issue describing the problem",
              "2. Include /bounty $[amount] in your issue body",
              `3. Reference this issue (#${issueNumber}) in your new issue`,
              "4. Submit a PR with the fix",
              "",
              "Bounty amounts are at contributor discretion based on severity:",
              "- Low: $50-$200",
              "- Medium: $200-$500",
              "- High: $500-$1200",
              "",
              "All issues and PRs are welcome. The more specific your",
              "description, the better."
            ].join("\n");

            await ensureLabels(issueLabels);

            const createdIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Bug Bounty Program — How to Participate",
              body: bodyForIssue("[NUMBER]"),
              labels: issueLabels
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: createdIssue.data.number,
              body: bodyForIssue(createdIssue.data.number)
            });

            try {
              await github.graphql(
                `
                  mutation($issueId: ID!) {
                    pinIssue(input: { issueId: $issueId }) {
                      issue {
                        number
                      }
                    }
                  }
                `,
                {
                  issueId: createdIssue.data.node_id
                }
              );
            } catch (error) {
              core.warning(`Created issue #${createdIssue.data.number}, but pinning failed: ${error.message}`);
            }
