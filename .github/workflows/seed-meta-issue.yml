name: Seed Meta Issue

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  seed-meta-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create and pin bug bounty program issue
        uses: actions/github-script@v7
        with:
          script: |
            const bodyForIssue = (issueNumber) => [
              "This repository runs an open bug bounty program.",
              "",
              "If you find a bug, security issue, or improvement opportunity",
              "in this codebase, you are encouraged to:",
              "",
              "1. Open a new issue describing the problem",
              "2. Include /bounty $[amount] in your issue body",
              `3. Reference this issue (#${issueNumber}) in your new issue`,
              "4. Submit a PR with the fix",
              "",
              "Bounty amounts are at contributor discretion based on severity:",
              "- Low: $50-$200",
              "- Medium: $200-$500",
              "- High: $500-$1200",
              "",
              "All issues and PRs are welcome. The more specific your",
              "description, the better."
            ].join("\n");

            const metaIssueTitles = new Set([
              "Bug Bounty Program - How to Participate",
              "Bug Bounty Program — How to Participate",
              "Bug Bounty Program â€” How to Participate"
            ]);

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });
            const existingMetaIssue = existingIssues.find(
              (issue) => !issue.pull_request && metaIssueTitles.has(issue.title)
            );

            let metaIssue = existingMetaIssue;
            if (metaIssue) {
              core.info(`Updating existing bug bounty program issue #${metaIssue.number}`);
            } else {
              const createdIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Bug Bounty Program - How to Participate",
                body: bodyForIssue("[NUMBER]"),
                labels: ["bounty", "good first issue", "AI agent friendly"]
              });
              metaIssue = createdIssue.data;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: metaIssue.number,
              body: bodyForIssue(metaIssue.number)
            });

            try {
              await github.graphql(
                `
                  mutation($issueId: ID!) {
                    pinIssue(input: { issueId: $issueId }) {
                      issue {
                        number
                      }
                    }
                  }
                `,
                {
                  issueId: metaIssue.node_id
                }
              );
            } catch (error) {
              core.warning(`Seeded issue #${metaIssue.number}, but pinning failed: ${error.message}`);
            }
