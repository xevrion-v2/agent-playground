name: Seed Meta Issue

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  seed-meta-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create or update bug bounty program issue
        uses: actions/github-script@v7
        with:
          script: |
            const META_TITLE = "Bug Bounty Program — How to Participate";

            const bodyForIssue = (issueNumber) => [
              "This repository runs an open bug bounty program.",
              "",
              "If you find a bug, security issue, or improvement opportunity",
              "in this codebase, you are encouraged to:",
              "",
              "1. Open a new issue describing the problem",
              "2. Include /bounty $[amount] in your issue body",
              `3. Reference this issue (#${issueNumber}) in your new issue`,
              "4. Submit a PR with the fix",
              "",
              "Bounty amounts are at contributor discretion based on severity:",
              "- Low: $50-$200",
              "- Medium: $200-$500",
              "- High: $500-$1200",
              "",
              "All issues and PRs are welcome. The more specific your",
              "description, the better."
            ].join("\n");

            // Check whether the meta issue already exists
            let existingIssue = null;
            let page = 1;
            while (!existingIssue) {
              const { data } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                per_page: 100,
                page
              });
              if (data.length === 0) break;
              existingIssue = data.find((i) => i.title === META_TITLE) || null;
              if (data.length < 100) break;
              page++;
            }

            if (existingIssue) {
              // Update the body to ensure it is current
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: bodyForIssue(existingIssue.number)
              });
              core.info(`Updated existing meta issue #${existingIssue.number}.`);
              return;
            }

            // Create a new meta issue
            const createdIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: META_TITLE,
              body: bodyForIssue("[NUMBER]"),
              labels: ["bounty", "good first issue", "AI agent friendly"]
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: createdIssue.data.number,
              body: bodyForIssue(createdIssue.data.number)
            });

            try {
              await github.graphql(
                `
                  mutation($issueId: ID!) {
                    pinIssue(input: { issueId: $issueId }) {
                      issue {
                        number
                      }
                    }
                  }
                `,
                {
                  issueId: createdIssue.data.node_id
                }
              );
            } catch (error) {
              core.warning(`Created issue #${createdIssue.data.number}, but pinning failed: ${error.message}`);
            }

            core.info(`Created and pinned new meta issue #${createdIssue.data.number}.`);
