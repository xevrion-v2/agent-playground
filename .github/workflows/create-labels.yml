name: Create Labels

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install YAML parser
        run: npm install --no-save --package-lock=false js-yaml@4.1.0

      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const yaml = require(`${process.cwd()}/node_modules/js-yaml`);

            const content = fs.readFileSync(".github/labels.yml", "utf8");
            const labels = yaml.load(content);

            if (!Array.isArray(labels)) {
              throw new Error(".github/labels.yml must contain a list of labels.");
            }

            for (const [index, label] of labels.entries()) {
              if (!label || typeof label !== "object" || Array.isArray(label)) {
                throw new Error(`Label entry ${index + 1} must be a mapping.`);
              }

              if (typeof label.name !== "string" || !label.name.trim()) {
                throw new Error(`Label entry ${index + 1} is missing a name.`);
              }

              if (typeof label.color !== "string" || !label.color.trim()) {
                throw new Error(`Label "${label.name}" is missing a color.`);
              }

              if (
                label.description !== undefined &&
                typeof label.description !== "string"
              ) {
                throw new Error(`Label "${label.name}" has a non-string description.`);
              }

              const name = label.name.trim();
              const color = label.color.trim().replace(/^#/, "");
              const description = label.description || "";

              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description
                });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }

                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  current_name: name,
                  name,
                  color,
                  description
                });
              }
            }
