name: Create Labels

on:
  push:
    branches:
      - main
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g js-yaml

      - name: Parse and Create Labels
        id: create_labels
        run: |
          # Use js-yaml to parse the YAML file safely
          # This handles colons, quotes, and escaped characters correctly
          LABELS=$(node -e "
            const fs = require('fs');
            const yaml = require('js-yaml');
            const content = fs.readFileSync('.github/labels.yml', 'utf8');
            const labels = yaml.load(content);
            console.log(JSON.stringify(labels));
          ")

          # Create labels using the GitHub API
          # We iterate through the parsed JSON array
          echo "$LABELS" | node -e "
            const labels = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const github = require('@actions/github');
            const token = process.env.GITHUB_TOKEN;
            const octokit = new (require('@octokit/rest'))({ auth: token });
            
            const owner = github.context.repo.owner;
            const repo = github.context.repo.repo;

            for (const label of labels) {
              try {
                await octokit.issues.createOrUpdateLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description || ''
                });
                console.log(\`Updated label: \${label.name}\`);
              } catch (error) {
                console.error(\`Failed to update label \${label.name}: \`, error.message);
              }
            }
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}