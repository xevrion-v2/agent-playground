name: Create Labels
on:
  push:
    branches: [main]
    paths: ['.github/labels.yml']
jobs:
  create-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: lannonbr/issue-label-manager-action@4.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config: .github/labels.yml
