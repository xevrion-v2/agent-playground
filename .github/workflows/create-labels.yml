name: Create Labels

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install YAML parser
        run: npm install --no-save js-yaml

      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { createRequire } = require("module");
            const requireFromWorkspace = createRequire(`${process.cwd()}/`);
            const yaml = requireFromWorkspace("js-yaml");

            const content = fs.readFileSync(".github/labels.yml", "utf8");
            const labels = yaml.load(content);

            if (!Array.isArray(labels)) {
              throw new Error(".github/labels.yml must contain a YAML list of labels.");
            }

            for (const label of labels) {
              if (!label || typeof label !== "object") {
                throw new Error("Each label entry must be a YAML object.");
              }

              if (typeof label.name !== "string" || !label.name.trim()) {
                throw new Error("Each label entry must include a non-empty name.");
              }

              if (typeof label.color !== "string" || !label.color.trim()) {
                throw new Error(`Label "${label.name}" must include a non-empty color.`);
              }

              const color = label.color.replace(/^#/, "");

              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color,
                  description: label.description || ""
                });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }

                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color,
                  description: label.description || ""
                });
              }
            }
