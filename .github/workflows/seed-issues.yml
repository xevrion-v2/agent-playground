name: Seed Starter Bounty Issues

on:
  workflow_dispatch:
    inputs:
      issue_titles:
        description: 'Comma-separated list of starter issue titles'
        required: true
      issue_bodies:
        description: 'Comma-separated list of starter issue bodies'
        required: true

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Find canonical Bug Bounty Program issue
        id: find_canonical
        uses: actions/github-script@v6
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const canonical = issues.data.find(issue =>
              issue.title.trim() === 'Bug Bounty Program — How to Participate' &&
              !issue.pull_request
            );
            if (canonical) {
              core.setOutput('canonical_number', canonical.number);
            } else {
              core.setOutput('canonical_number', '');
            }

      - name: Seed starter bounty issues
        uses: actions/github-script@v6
        with:
          script: |
            const titles = process.env['INPUT_ISSUE_TITLES'].split(',').map(t => t.trim());
            const bodies = process.env['INPUT_ISSUE_BODIES'].split(',').map(b => b.trim());
            const parentRef = steps.find_canonical.outputs.canonical_number ? `Parent bounty: #${steps.find_canonical.outputs.canonical_number}\n\n` : '';
            for (let i = 0; i < titles.length; i++) {
              let body = bodies[i];
              // Insert parent bounty reference at the top if found
              if (parentRef) {
                body = `${parentRef}${body}`;
              }
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: titles[i],
                body: body
              });
            }
