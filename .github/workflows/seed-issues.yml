name: Seed Good First Issues

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get existing issues
        id: get_issues
        uses: actions/github-script@v6
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });
            return issues.data.map(issue => ({
              title: issue.title,
              number: issue.number,
              id: issue.id
            }));

      - name: Seed starter issues
        uses: actions/github-script@v6
        with:
          script: |
            // Get existing issues
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });
            
            const existingTitles = new Map();
            existingIssues.data.forEach(issue => {
              existingTitles.set(issue.title, issue.number);
            });
            
            // Define starter issues to create
            const starterIssues = [
              {
                title: "Implement feature X",
                body: "Implement the new feature as described in the documentation.\n\nReferences #33."
              },
              {
                title: "Fix bug Y", 
                body: "Fix the critical bug in the authentication flow.\n\nReferences #33."
              },
              {
                title: "Improve documentation Z",
                body: "Enhance the project documentation with better examples.\n\nReferences #33."
              }
            ];
            
            // Create issues only if they don't already exist
            for (const issueData of starterIssues) {
              if (!existingTitles.has(issueData.title)) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issueData.title,
                  body: issueData.body,
                  labels: ['good first issue', 'bounty']
                });
              }
            }